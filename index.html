

<!DOCTYPE html>
<html>
<head>
  <title>Tile Game</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #222;
    }
  </style>
</head>
<body>

<canvas id="game" width="320" height="320" style="border:2px solid red;"></canvas>

<div style="
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
">
  <iframe width="560" height="315"
    src="https://www.youtube.com/embed/0TnNEpg9_Sg?start=23&autoplay=1"
    title="YouTube video player"
    frameborder="0"
    allow="autoplay"
    allowfullscreen>
  </iframe>
</div>


<script>
(() => {

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const tileSize = 64;

const map = [
  [1,1,1,1,1,0],
  [1,0,0,0,1,3],
  [1,0,2,0,1,3],
  [1,0,0,0,1,3],
  [1,1,1,1,1,3],
  [1,1,1,1,1,3]
];

let player = { x: 2, y: 2 };

function drawMap() {
  for (let y = 0; y < map.length; y++) {
    for (let x = 0; x < map[y].length; x++) {

      let tile = map[y][x];

      if (tile === 0) ctx.fillStyle = "green";
      if (tile === 1) ctx.fillStyle = "gray";
      if (tile === 2) ctx.fillStyle = "blue";

      ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
      ctx.strokeStyle = "black";
      ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
    }
  }
}

function drawPlayer() {
  ctx.fillStyle = "red";
  ctx.fillRect(
    player.x * tileSize + 16,
    player.y * tileSize + 16,
    32,
    32
  );
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawMap();
  drawPlayer();
}

document.addEventListener("keydown", (e) => {
  let newX = player.x;
  let newY = player.y;

  if (e.key === "ArrowUp") newY--;
  if (e.key === "ArrowDown") newY++;
  if (e.key === "ArrowLeft") newX--;
  if (e.key === "ArrowRight") newX++;

  if (
    newY >= 0 &&
    newY < map.length &&
    newX >= 0 &&
    newX < map[0].length &&
    map[newY][newX] !== 1
  ) {
    player.x = newX;
    player.y = newY;
  }

  draw();
});

draw();

})();
</script>

</body>
</html>
